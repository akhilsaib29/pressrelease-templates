<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates Index</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #38bdf8;
            font-weight: 700;
        }

        ul {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        li {
            display: flex;
        }

        a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 1.5rem;
            background: rgba(30, 41, 59, 1);
            color: #bae6fd;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        a:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            color: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Press-release Templates</h1>

            <li><a href="templates/elegant-template.html">Elegant Template</a></li>
            <li><a href="main-index.html">Website template</a></li>
            <li><a href="templates/press-release.html">Press Release</a></li>
            <li><a href="templates/professional-template.html">Professional Template</a></li>
            <li><a href="templates/template.html">Base Template</a></li>
        </ul>
    </div>
</body>

</html>
